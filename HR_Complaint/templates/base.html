<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>HR Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
    :root {
      --primary: #0c4103;
      --accent: #e67e22;
    }
    body { background: #f4f6f9; font-family: 'Segoe UI', sans-serif; }
    .navbar { background: var(--primary) !important; }
    .navbar-brand { font-weight: 700; letter-spacing: 1px; color: #5c74b0 !important; }
    .sidebar { min-height: 100vh; background: var(--primary); color: #fff; padding-top: 20px; }
    .sidebar a { color: #cce0f5; text-decoration: none; display: block; padding: 10px 20px; border-radius: 6px; transition: 0.2s; }
    .sidebar a:hover, .sidebar a.active { background: rgba(255,255,255,0.15); color: #fff; }
    .sidebar .nav-label { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #7fa8c9; padding: 16px 20px 4px; }
    .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.07); }
    .stat-card { border-left: 4px solid var(--accent); }
    .btn-primary { background: var(--primary); border-color: var(--primary); }
    .btn-primary:hover { background: #0f2840; }

  </style>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">HR Portal</a>
            <div class="navbar-nav">
                <a class="nav-link" href="/login">Login</a>
                <a class="nav-link" href="/register">Register</a>
                <a class="nav-link" href="/complaint">Submit Complaint</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        {% block content %}{% endblock %}
    </div>

    <div class="text-center py-5">
    <div class="mb-4">
    <i class="bi bi-shield-check" style="font-size:72px; color:#f39c12;"></i>
    </div>
    <h1 class="fw-bold" style="color:#f39c12;">HR Complaint Management Panel</h1>
</body>
</html>
