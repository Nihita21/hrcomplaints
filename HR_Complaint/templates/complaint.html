{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">Submit HR Complaint</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Subject / Incident Type</label>
                        <select name="subject" class="form-select">
                            <option value="harassment">Workplace Harassment</option>
                            <option value="payroll">Payroll Issues</option>
                            <option value="safety">Safety Concerns</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Detailed Description</label>
                        <textarea name="description" class="form-control" rows="5" placeholder="Please provide specific details..." required></textarea>
                    </div>
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" name="anonymous" id="anon">
                        <label class="form-check-label" for="anon">Submit Anonymously</label>
                    </div>
                    <button type="submit" class="btn btn-danger">Submit Report</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
